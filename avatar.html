<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アバター姿勢制御</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }
    #three-canvas { display: block; }
    #cam-wrap {
      position: fixed; bottom: 10px; left: 10px;
      width: 160px; border: 1px solid #555; border-radius: 4px; overflow: hidden;
    }
    #cam-wrap video { display: block; width: 100%; }
    #cam-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 0.9rem; gap: 16px; z-index: 10;
    }
    #bar-wrap { width: 260px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: #00ff88; border-radius: 4px; transition: width 0.3s ease; }
  </style>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="pose-canvas"></canvas>
  </div>
  <div id="overlay">
    <div id="status">初期化中...</div>
    <div id="bar-wrap"><div id="bar"></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.0/lib/three-vrm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

  <script>
    const threeCanvas = document.getElementById('three-canvas');
    const video = document.getElementById('video');
    const poseCanvas = document.getElementById('pose-canvas');
    const poseCtx = poseCanvas.getContext('2d');

    // ---- Three.js ----
    const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.3, 3.5);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(1, 2, 2);
    scene.add(dirLight);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    const clock = new THREE.Clock();
    let currentVRM = null;

    // ---- VRM 読み込み ----
    function loadVRM(url) {
      const loader = new THREE.GLTFLoader();
      loader.register(parser => new THREE_VRM.VRMLoaderPlugin(parser));
      loader.load(url,
        (gltf) => {
          const vrm = gltf.userData.vrm;
          THREE_VRM.VRMUtils.removeUnnecessaryVertices(gltf.scene);
          THREE_VRM.VRMUtils.removeUnnecessaryJoints(gltf.scene);
          vrm.scene.rotation.y = Math.PI;
          scene.add(vrm.scene);
          currentVRM = vrm;
          setStatus('準備完了', 100);
          setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 600);
        },
        (xhr) => {
          if (xhr.total > 0) {
            const pct = 60 + (xhr.loaded / xhr.total) * 35;
            setStatus(`アバター読み込み中... ${Math.round(pct)}%`, pct);
          }
        },
        (err) => { setStatus('VRM読み込みエラー: ' + (err.message || err), 0); }
      );
    }

    // ---- ユーティリティ ----
    function lerp(a, b, t) { return a + (b - a) * t; }

    function setBone(h, name, rx, ry, rz, t) {
      const bone = h.getBoneNode(name);
      if (!bone) return;
      bone.rotation.x = lerp(bone.rotation.x, rx, t);
      bone.rotation.y = lerp(bone.rotation.y, ry, t);
      bone.rotation.z = lerp(bone.rotation.z, rz, t);
    }

    // ---- MoveNet → VRM ボーン変換 ----
    // MoveNet keypoints:
    // 0:nose 1:left_eye 2:right_eye 3:left_ear 4:right_ear
    // 5:left_shoulder 6:right_shoulder 7:left_elbow 8:right_elbow
    // 9:left_wrist 10:right_wrist 11:left_hip 12:right_hip
    // 13:left_knee 14:right_knee 15:left_ankle 16:right_ankle
    function applyPoseToVRM(kps, vrm) {
      if (!vrm) return;
      const h = vrm.humanoid;
      const kp = (i) => kps[i]?.score > 0.3 ? kps[i] : null;

      const ls = kp(5), rs = kp(6);
      const le = kp(7), re = kp(8);
      const lw = kp(9), rw = kp(10);
      const lh = kp(11), rh = kp(12);
      const lk = kp(13), rk = kp(14);

      // 左上腕: shoulder→elbow (T-pose: screen右方向, angle=0)
      if (ls && le) {
        const a = Math.atan2(le.y - ls.y, le.x - ls.x);
        setBone(h, 'leftUpperArm', 0, 0, -a, 0.3);
      }

      // 右上腕: shoulder→elbow (T-pose: screen左方向, angle=π)
      if (rs && re) {
        const a = Math.atan2(re.y - rs.y, re.x - rs.x);
        setBone(h, 'rightUpperArm', 0, 0, Math.PI - a, 0.3);
      }

      // 左前腕: ひじの曲げ
      if (ls && le && lw) {
        const a1 = Math.atan2(le.y - ls.y, le.x - ls.x);
        const a2 = Math.atan2(lw.y - le.y, lw.x - le.x);
        const bend = a2 - a1;
        setBone(h, 'leftLowerArm', 0, 0, -bend * 0.6, 0.3);
      }

      // 右前腕: ひじの曲げ
      if (rs && re && rw) {
        const a1 = Math.atan2(re.y - rs.y, re.x - rs.x);
        const a2 = Math.atan2(rw.y - re.y, rw.x - re.x);
        const bend = a2 - a1;
        setBone(h, 'rightLowerArm', 0, 0, bend * 0.6, 0.3);
      }

      // 左大腿: hip→knee (T-pose: screen下方向, angle=π/2)
      if (lh && lk) {
        const a = Math.atan2(lk.y - lh.y, lk.x - lh.x);
        setBone(h, 'leftUpperLeg', 0, 0, -(a - Math.PI / 2), 0.3);
      }

      // 右大腿: hip→knee
      if (rh && rk) {
        const a = Math.atan2(rk.y - rh.y, rk.x - rh.x);
        setBone(h, 'rightUpperLeg', 0, 0, -(a - Math.PI / 2), 0.3);
      }

      // 脊椎の傾き
      if (ls && rs && lh && rh) {
        const smx = (ls.x + rs.x) / 2, smy = (ls.y + rs.y) / 2;
        const hmx = (lh.x + rh.x) / 2, hmy = (lh.y + rh.y) / 2;
        const a = Math.atan2(smy - hmy, smx - hmx);
        setBone(h, 'spine', 0, 0, -(a + Math.PI / 2) * 0.5, 0.2);
      }

      // 頭の傾き（肩の傾きに連動）
      if (ls && rs) {
        const a = Math.atan2(rs.y - ls.y, rs.x - ls.x);
        setBone(h, 'head', 0, 0, -a * 0.3, 0.2);
      }
    }

    function setStatus(msg, pct) {
      document.getElementById('status').textContent = msg;
      document.getElementById('bar').style.width = pct + '%';
    }

    // ---- スケルトン描画ペア（MoveNet 17点）----
    const PAIRS = [
      [0,1],[0,2],[1,3],[2,4],
      [5,6],[5,7],[7,9],[6,8],[8,10],
      [5,11],[6,12],[11,12],
      [11,13],[13,15],[12,14],[14,16]
    ];

    let poseDetector = null;

    // ---- 姿勢推定ループ ----
    async function poseLoop() {
      if (poseDetector && video.readyState >= 2) {
        try {
          const poses = await poseDetector.estimatePoses(video);
          poseCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

          if (poses.length > 0) {
            const kps = poses[0].keypoints;

            poseCtx.strokeStyle = '#00ff88';
            poseCtx.lineWidth = 2;
            for (const [a, b] of PAIRS) {
              if (kps[a]?.score > 0.3 && kps[b]?.score > 0.3) {
                poseCtx.beginPath();
                poseCtx.moveTo(kps[a].x, kps[a].y);
                poseCtx.lineTo(kps[b].x, kps[b].y);
                poseCtx.stroke();
              }
            }
            poseCtx.fillStyle = '#ff4444';
            for (const kp of kps) {
              if (kp.score > 0.3) {
                poseCtx.beginPath();
                poseCtx.arc(kp.x, kp.y, 4, 0, Math.PI * 2);
                poseCtx.fill();
              }
            }

            applyPoseToVRM(kps, currentVRM);
          }
        } catch (e) {
          console.warn('pose error:', e);
        }
      }
      requestAnimationFrame(poseLoop);
    }

    // ---- レンダーループ ----
    function renderLoop() {
      requestAnimationFrame(renderLoop);
      if (currentVRM) currentVRM.update(clock.getDelta());
      renderer.render(scene, camera);
    }

    // ---- 初期化 ----
    async function init() {
      setStatus('カメラを起動中...', 10);
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await new Promise(r => video.onloadeddata = r);
      poseCanvas.width = video.videoWidth;
      poseCanvas.height = video.videoHeight;

      setStatus('姿勢モデルをダウンロード中...', 30);
      poseDetector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );

      setStatus('アバターを読み込み中...', 65);
      loadVRM('./avatar.vrm');

      renderLoop();
      poseLoop();
    }

    init().catch(err => {
      document.getElementById('status').textContent = 'エラー: ' + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
